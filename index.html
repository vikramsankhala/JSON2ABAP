<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to ABAP Converter | S/4HANA Best Practices</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">{ }</span>
        <h1>JSON → ABAP Converter</h1>
      </div>
      <p class="subtitle">S/4HANA • xco_cp_json • Best Practices</p>
    </header>

    <main class="main">
      <section class="input-section">
        <div class="section-header">
          <h2>JSON Input</h2>
          <div class="actions">
            <button type="button" class="btn btn-secondary" id="btn-validate">Validate JSON</button>
            <button type="button" class="btn btn-secondary" id="btn-sample">Load Sample</button>
            <button type="button" class="btn btn-primary" id="btn-convert">Convert to ABAP</button>
          </div>
        </div>
        <textarea id="json-input" placeholder='Paste your JSON here, e.g.:
{
  "TranDtls": { "TaxSch": "GST", "Suptyp": "B2B" },
  "DocDtls": { "Typ": "INV", "No": "3040000100" },
  "ItemList": [ { "ItemNo": 1, "Qty": 100.5 } ]
}'></textarea>
        <div id="error-message" class="error-message" aria-live="polite"></div>
      </section>

      <section class="output-section">
        <div class="section-header">
          <h2>ABAP Output</h2>
          <div class="actions">
            <button type="button" class="btn btn-secondary" id="btn-copy">Copy to Clipboard</button>
          </div>
        </div>
        <div class="output-tabs">
          <button type="button" class="tab active" data-tab="types">TYPES</button>
          <button type="button" class="tab" data-tab="deserialize">Deserialize Call</button>
          <button type="button" class="tab" data-tab="full">Full Code</button>
        </div>
        <pre id="abap-output"><code id="abap-code">* Paste JSON and click "Convert to ABAP"</code></pre>
      </section>
    </main>

    <footer class="footer">
      <p>Based on SAP S/4HANA best practices • Uses <code>xco_cp_json</code> • PascalCase → underscore • <a href="https://github.com/vikramsankhala/JSON2ABAP" target="_blank" rel="noopener">View on GitHub</a></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
